<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
      <title>{{ title }}</title>
    {% else %}
      <title>AI Document Assistant</title>
    {% endif %}

    <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
</head>
<body>
  <header class="topbar">
        <a class="home-link" href="{{url_for('home')}}"><h1 class="app-name">AI Document Assistant</h1></a>
      <form action="{{url_for('web_sync_documents')}}" method="post">
        <button class="sync-docs" type="submit">Sync Documents</button>
      </form>
  </header>

  <main class="container">
      {% block content %}
      {% endblock %}
  </main>
</body>
</html>
